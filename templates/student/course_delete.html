{% extends 'base.html' %}
{% block title %}Delete Course{% endblock %}
 
{% block content %}
<div class="row justify-content-center" style="margin-top:2rem;">
    <div class="col-md-5 col-lg-4">
        <div class="mdn-card" style="border-color:#fecaca;">
 
            <!-- Header -->
            <div class="mdn-card-header" style="background:#fef2f2;border-color:#fecaca;color:#b91c1c;">
                <i class="bi bi-exclamation-triangle-fill" style="color:#ef4444;"></i>
                Delete Course
            </div>
 
            <div style="padding:2rem 1.75rem;text-align:center;">
 
                <!-- Icon -->
                <div style="width:60px;height:60px;border-radius:16px;background:#fef2f2;border:1px solid #fecaca;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.25rem;">
                    <i class="bi bi-journal-x" style="font-size:1.6rem;color:#ef4444;"></i>
                </div>
 
                <p style="color:var(--muted);font-size:0.875rem;margin-bottom:0.4rem;">You are about to delete the course:</p>
                <div style="font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700;margin-bottom:1.5rem;">
                    {{ course.name }}
                </div>
 
                <!-- Warning box -->
                <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:0.85rem 1rem;text-align:left;margin-bottom:1.5rem;font-size:0.84rem;color:#7f1d1d;">
                    <i class="bi bi-exclamation-circle-fill me-1" style="color:#ef4444;"></i>
                    Students assigned to this course will have their course set to blank. This action <strong>cannot be undone</strong>.
                </div>
 
                <form method="POST">
                    {% csrf_token %}
                    <div style="display:flex;gap:10px;justify-content:center;">
                        <a href="{% url 'course_list' %}" class="btn-mdn-outline" style="padding:0.45rem 1.5rem;color:var(--muted);border-color:var(--border);">
                            Cancel
                        </a>
                        <button type="submit" class="btn-mdn" style="background:#ef4444;padding:0.45rem 1.5rem;">
                            <i class="bi bi-trash3"></i> Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
