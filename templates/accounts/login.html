{% extends 'base.html' %}
{% block title %}Student Login{% endblock %}

{% block content %}
<style>
  body { background: #eef2f7 !important; }
  .lw { min-height:75vh; display:flex; align-items:center; justify-content:center; padding:1.5rem 1rem; }
  .lb { width:100%; max-width:420px; }
  .lt { display:flex; align-items:flex-start; gap:1.5rem; margin-bottom:1.5rem; }
  .lh { font-size:1.6rem; font-weight:900; color:#0d1117; line-height:1.15; flex-shrink:0; }
  .ls { font-size:.85rem; color:#8a9ab0; line-height:1.5; padding-top:.2rem; }
  .lc { background:#fff; border-radius:14px; padding:1.6rem 1.75rem; box-shadow:0 2px 14px rgba(0,0,0,.07); }
  .ll { display:block; font-size:.82rem; font-weight:700; color:#0d1117; margin-bottom:.4rem; }
  .ll span { font-weight:400; color:#8a9ab0; }
  .li { display:block; width:100%; padding:.65rem .9rem; border:1.5px solid #dde3ec; border-radius:9px; font-size:.9rem; color:#0d1117; background:#fff; outline:none; transition:border-color .15s,box-shadow .15s; }
  .li:focus { border-color:#3b6ef8; box-shadow:0 0 0 3px rgba(59,110,248,.13); }
  .li::placeholder { color:#c5cdd8; }
  .lg { margin-bottom:1.1rem; }
  .lbtn { display:block; width:100%; padding:.75rem; background:#3b6ef8; color:#fff; border:none; border-radius:50px; font-size:.92rem; font-weight:700; cursor:pointer; transition:background .15s; margin-top:.4rem; }
  .lbtn:hover { background:#2a5ce0; }
  .lf { border-top:1px solid #eef0f4; margin-top:1.25rem; padding-top:.9rem; text-align:center; font-size:.82rem; color:#8a9ab0; }
  .lf a { color:#0d1117; font-weight:700; text-decoration:underline; }
</style>

<div class="lw">
  <div class="lb">
    <div class="lt">
      <div class="lh">Student<br>Login</div>
      <div class="ls">Sign in with your roll number and date of birth</div>
    </div>
    <div class="lc">
      <form method="POST">
        {% csrf_token %}
        <div class="lg">
          <label class="ll">Roll Number</label>
          <input type="text" name="username" class="li" required autofocus>
        </div>
        <div class="lg">
          <label class="ll">Date of Birth <span>(YYYY-MM-DD)</span></label>
          <input type="text" name="password" class="li" required>
        </div>
        <button type="submit" class="lbtn">Log in as Student</button>
      </form>
      <div class="lf">
        Admin or Staff? <a href="{% url 'staff_login' %}">Staff Login &rarr;</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
