{% extends 'base.html' %}
{% block title %}Staff Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-4">
        <div class="mdn-page-header text-center" style="border:none;padding-bottom:0.5rem">
            <h1 style="font-size:1.5rem">Staff Login</h1>
            <p>Admin and Staff sign in here</p>
        </div>
        <div class="mdn-card">
            <div class="p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Your password" required>
                    </div>
                    <button type="submit" class="btn btn-mdn w-100">Log in</button>
                </form>
                <hr style="border-color:var(--mdn-border)">
                <div class="d-flex justify-content-between" style="font-size:0.85rem">
                    <span style="color:var(--mdn-muted)">Student? <a href="{% url 'login' %}" style="color:var(--mdn-blue);font-weight:600">Student Login &rarr;</a></span>
                    <a href="{% url 'register' %}" style="color:var(--mdn-blue);font-weight:600">Create account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
